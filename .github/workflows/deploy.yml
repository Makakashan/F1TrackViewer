name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build with Next.js
        env:
          GITHUB_PAGES: "true"
        run: bunx next build --webpack

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: https://makakashan.github.io/F1TrackViewer/
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          error_count: 30
          reporting_interval: 15000

      - name: Wait before Pages deploy retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Retry deploy to GitHub Pages
        id: deployment_retry_1
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          error_count: 30
          reporting_interval: 15000

      - name: Wait before final Pages deploy retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_1.outcome == 'failure'
        run: sleep 60

      - name: Final retry deploy to GitHub Pages
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          error_count: 30
          reporting_interval: 15000
